# ============================================================
#  ⏱️  WakaTime Stats Updater
#  Updates your README with weekly coding time breakdown
#  Requires: WAKATIME_API_KEY secret in repo settings
# ============================================================

name: "⏱️ Update WakaTime Stats"

on:
  schedule:
    - cron: "0 10 * * 1"   # Every Monday at 10:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update WakaTime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update WakaTime stats
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_OS: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE: "True"
          SHOW_PROJECTS: "True"
          COMMIT_MESSAGE: "\u23f1\ufe0f wakatime: weekly stats updated"
