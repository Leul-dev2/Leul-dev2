name: Animate Contributions Snake

on:
  workflow_dispatch:  # manual trigger
  schedule:
    - cron: "0 0 * * *" # optional daily run

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake
        uses: Platane/snk@master
        with:
          github_user_name: Leul-dev2
          # Number of weeks to show (52 for last year)
          weeks: 52
          # Output SVG file
          svg_out_path: dist/github-contribution-grid-snake.svg
          # Optional: start date (format YYYY-MM-DD)
          start_date: 2025-03-19  # set it 1 year ago or when you want
          
      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
